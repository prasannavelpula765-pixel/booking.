<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay with UPI</title>
  <style>
    body {
      display: flex;
      justify-content: center;   /* Horizontal center */
      align-items: center;       /* Vertical center */
      height: 100vh;             /* Full screen height */
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }
    .container {
      text-align: center;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }
    #upi-section {
      display: none;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #28a745;
      color: white;
    }
    button:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Pay button -->
    <button id="pay-button">Pay with UPI</button>
    

    <!-- Hidden UPI QR section -->
    <div id="upi-section">
      <h3>Scan to Pay</h3>
      <img src="WIN_20251115_08_51_47_Pro.jpg" alt="UPI QR Code" width="250">
      <p>UPI ID: suryav0000@upi</p>

      <!-- Confirm Order button -->
      <button id="confirm-button">Confirm Order</button>
    </div>
  </div>

  <script>
    // Show QR when Pay button is clicked
    document.getElementById("pay-button").onclick = function() {
      document.getElementById("upi-section").style.display = "block";
    };

    // Redirect to thank.html when Confirm Order is clicked
    document.getElementById("confirm-button").onclick = function() {
      window.location.href = "thank.html";
    };
  </script>
</body>
</html>
