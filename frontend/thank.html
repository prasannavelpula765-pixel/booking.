<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#28a745">
  <title>Thank You</title>
  <style>
    body {
      display: flex;
      justify-content: center;   /* Horizontal center */
      align-items: center;       /* Vertical center */
      height: 100vh;             /* Full screen height */
      margin: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      flex-direction: column;    /* Stack messages vertically */
    }

    .thank-message {
      text-align: center;
      color: #010413;
      font-size: 30px;
      margin: 10px;
      background: #f0fff0;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }

    .thank-message3 {
      text-align: center;
      color: #0d2fdc;
      font-size: 30px;
      margin: 10px;
      background: #f0fff0;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1 class="thank-message">✅ Thank you for ordering! Your Order is confirmed.</h1>
  <h3 class="thank-message3">To visit Again!</h3>
</body>
</html>
